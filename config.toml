api_key_env = "CLOUDBET_API_KEY"
api_key_header = "X-API-Key"
base_url = "https://sports-api.cloudbet.com/pub/v2/odds"

[prematch]
once = true
interval_seconds = 60
output = "data/watchlist.jsonl"
# 提前 120 分钟将符合条件的比赛加入监控名单，确保开球前 watchlist 已填充
minutes_to_kickoff_max = 120
min_favorite_line_abs = 1.0
min_favorite_odds = 1.6
verbose = true

[live]
once = true
watchlist = "data/watchlist.jsonl"
output = "data/live_signals.jsonl"
trigger_total_line = 1.25
primary_minute_start = 55
primary_minute_end = 72
allowed_scores = ["0:0", "1:0", "0:1"]
min_seconds_since_reopen = 20
max_line_jumps_last_60s = 1
max_odds_jumps_last_60s = 3
min_over_odds = 1.8
normal_interval_seconds = 15
fast_interval_seconds = 5
fast_line_threshold = 1.75

[pipeline]
prematch_interval_seconds = 60
output_dir = "data"
persist_watchlist = true
persist_signals = true
persist_bets = true
finished_cleanup_interval_seconds = 300
settlement_check_interval_seconds = 300

[betting]
enabled = true
# Real-money mode
dry_run = false
stake_per_bet = 10.0
currency = "USDT"
min_accepted_price = 1.78
max_active_bets = 3

# Safety gate: live betting is blocked unless token equals phrase.
require_live_ack = true
live_ack_phrase = "LIVE_BETTING_ACK"
live_ack_token = "LIVE_BETTING_ACK"

[money]
initial_bankroll = 500.0

# ── Kelly 参数 ────────────────────────────────────────────────────────────────
# FIX: 从 0.15 提高到 0.25，确保在常见赔率(1.80-1.95)下单注超过最低 5 USDT
kelly_fraction = 0.25
base_win_rate = 0.55
min_win_rate = 0.50
max_win_rate = 0.70
quality_adjustment = 0.07
# FIX: 去掉 min_kelly_edge 严格截断（设为 0），仅靠 force_min_stake 兜底
min_kelly_edge = 0.0

# ── 注额控制 ──────────────────────────────────────────────────────────────────
# FIX: reserve_bankroll_pct 从 0.20 改为 0（不留备用金），让全部本金参与 Kelly 计算
reserve_bankroll_pct = 0.0
# max_stake_pct 从 0.02 调到 0.03（单注上限 = 3% 本金，约 15 USDT）
max_stake_pct = 0.03
min_stake = 5.0
max_stake = 25.0
# FIX: force_min_stake = true → 只要有正期望，至少下 min_stake（5 USDT）
# 之前 false + 小 kelly = 返回 0 → [BET SKIP] no positive edge（主要原因）
force_min_stake = true

# ── 风控止损 ──────────────────────────────────────────────────────────────────
# FIX: daily_loss_limit_pct 从 0.04 (4%=$20) 调到 0.10 (10%=$50)
# 之前 4% 意味着 2 笔 $10 亏损就封停一天（太紧）
daily_loss_limit_pct = 0.10
# max_drawdown_pct 保持 20%（历史最高净值回撤超过 20% 暂停）
max_drawdown_pct = 0.20
# FIX: max_concurrent_exposure_pct 从 0.08 (8%=$40) 调到 0.20 (20%=$100)
# 之前 8% 意味着连 2 笔 $25 注单都容不下
max_concurrent_exposure_pct = 0.20
# 连续亏损 5 次暂停（原 3 次太紧）
max_consecutive_losses = 5
max_daily_bets = 10
# FIX: bet_cooldown_seconds 从 60 降到 15（赛事不会同时出信号，60 秒太保守）
bet_cooldown_seconds = 15

auto_settle_after_minutes = 130
bankroll_file = "data/bankroll.json"

# 禁用账户余额自动同步（Account API 不可用时不会崩溃退出）
# 设为 true 则每次启动从 Cloudbet 账户拉取真实余额覆盖本地 bankroll
sync_with_account_balance = false
